<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #0A0A0A; }
      .logo-color { fill: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #FAFAFA; }
      .logo-color { fill: #0A0A0A; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="40" />
  <g transform="translate(40, 40) scale(1)">
    <!-- Left leg of letter A -->
    <path class="logo-color" d="M30 80 L50 20 L58 20 L38 80 Z" />
    <!-- Right leg of letter A -->
    <path class="logo-color" d="M70 80 L50 20 L42 20 L62 80 Z" opacity="0.8" />
    <!-- Premium red accent stripe -->
    <path d="M32 58 L68 58" stroke="#EF4444" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>