<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E53E3E"/>
      <stop offset="100%" stop-color="#FC4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield base shape -->
  <path d="M100 12 L175 42 L175 100 Q175 152 100 188 Q25 152 25 100 L25 42 Z"
        fill="url(#shieldGrad)" stroke="#2d3561" stroke-width="1.5"/>

  <!-- Shield inner border highlight -->
  <path d="M100 22 L165 48 L165 100 Q165 146 100 178 Q35 146 35 100 L35 48 Z"
        fill="none" stroke="#ffffff08" stroke-width="1"/>

  <!-- Letter A - left stroke -->
  <path d="M72 130 L100 55 L128 130" stroke="white" stroke-width="11"
        stroke-linecap="square" stroke-linejoin="miter" fill="none"
        filter="url(#glow)"/>

  <!-- Letter A - crossbar (red accent) -->
  <rect x="80" y="100" width="40" height="9" rx="0" fill="url(#redGrad)" filter="url(#glow)"/>

  <!-- Speed lines - decorative bottom -->
  <line x1="55" y1="143" x2="80" y2="143" stroke="#E53E3E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="55" y1="150" x2="72" y2="150" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="120" y1="143" x2="145" y2="143" stroke="#E53E3E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="128" y1="150" x2="145" y2="150" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Top crown dots -->
  <circle cx="100" cy="12" r="3" fill="#E53E3E"/>
</svg>
